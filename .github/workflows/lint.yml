name: Linter run

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: 'yarn'

    - name: Install Dependencies
      run: yarn install

    - name: Run linter
      run: npx nx affected -t lint
