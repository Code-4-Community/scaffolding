name: Jest run

on:
  push:
    branches: ['main', '97-github-actions---automatic-lint-and-test-check']
  pull_request:
    branches: ['main']

jobs:
  build:
    
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'

    - name: Install Dependencies
    - run: yarn install

    - name: Run Jest tests 
    - run: yarn test